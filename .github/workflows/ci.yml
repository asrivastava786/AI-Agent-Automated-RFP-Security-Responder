name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ── Backend: lint ────────────────────────────────────────────────────────────
  lint-backend:
    name: Backend · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check rfp_responder tests

      - name: Ruff format check
        run: ruff format --check rfp_responder tests

  # ── Backend: type check ───────────────────────────────────────────────────────
  typecheck-backend:
    name: Backend · Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Mypy
        run: mypy rfp_responder
        env:
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
          NEO4J_PASSWORD: test
          POSTGRES_DSN: postgresql+psycopg://u:p@localhost/db
          LANGCHAIN_API_KEY: ls__test

  # ── Backend: tests ────────────────────────────────────────────────────────────
  test-backend:
    name: Backend · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=rfp_responder \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=75 \
            -v
        env:
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
          NEO4J_PASSWORD: test
          POSTGRES_DSN: postgresql+psycopg://u:p@localhost/db
          LANGCHAIN_API_KEY: ls__test
          AUTH_SECRET: test-secret-32-bytes-long-enough!

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Frontend: lint + type check ───────────────────────────────────────────────
  lint-frontend:
    name: Frontend · Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Docker: build both images ─────────────────────────────────────────────────
  docker-build:
    name: Docker · Build images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: rfp-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: rfp-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish images (main branch only) ────────────────────────────────────────
  docker-push:
    name: Docker · Push to registry
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
