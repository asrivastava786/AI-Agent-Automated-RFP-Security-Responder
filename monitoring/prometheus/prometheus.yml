global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: rfp-responder
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "rules/*.yml"

scrape_configs:

  # FastAPI backend (prometheus-fastapi-instrumentator)
  - job_name: rfp_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # arq worker (exposes prometheus metrics via arq-prometheus or custom endpoint)
  - job_name: rfp_worker
    static_configs:
      - targets: ["worker:9100"]
    scrape_interval: 30s

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
